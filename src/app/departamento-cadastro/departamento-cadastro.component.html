<div class="container">

  <form #departamentoForm="ngForm" (ngSubmit)="salvar(departamentoForm)">

    <div class="grid">
<div class="col-12">
  <h1>Novo Departamento</h1>
</div>

    <div class="col-12 p-fluid">
      <label>Nome Departamento</label>
      <input pInputText type="text" name="nome" ngModel  required minlength="2" #nome="ngModel">
      <div *ngIf="nome.hasError('required') && nome.dirty" style="background-color: red; color: white;">
        O campo nome é obrigatório
      </div>

      <div *ngIf="nome.hasError('minlength') && nome.dirty" style="background-color: red; color: white;">
        O campo nome precisa ter mais que 2 carácteres
      </div>
    </div>

<button pButton type="submit" label="Salvar" [disabled]="departamentoForm.invalid"></button>

<button pButton  type="button" label="Novo" class="p-button-warning"></button>
<a routerLink="/departamentos">voltar</a>
</div>
  </form>

</div>
